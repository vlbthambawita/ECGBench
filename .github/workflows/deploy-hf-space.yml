name: Deploy to HuggingFace Space

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-hf-space.yml'
    tags:
      - 'v[0-9]*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate HF_TOKEN secret
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "${HF_TOKEN}" ]; then
            echo "::error::HF_TOKEN secret is not set. Go to Settings -> Secrets -> Actions."
            exit 1
          fi
          echo "HF_TOKEN is set (length: ${#HF_TOKEN})"

      - name: Install huggingface_hub
        run: pip install -q "huggingface_hub>=0.23"

      - name: Override baseurl for HF Space
        # GitHub Pages serves under /ECGBench/, but HF Spaces serve at the
        # root path, so we need an empty baseurl for assets/links to resolve.
        run: |
          sed -i 's|^baseurl:.*|baseurl: ""|' docs/_config.yml
          echo "Patched docs/_config.yml:"
          cat docs/_config.yml

      - name: Build with Jekyll
        # HF Spaces with sdk: static do not run Jekyll, so we must render
        # the Liquid templates here and upload the built _site/ instead of docs/.
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Write _version.json into built site
        # Jekyll excludes _*-prefixed files by default, so write the
        # version stamp directly into the built output after the build.
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" == refs/* ]]; then
            TAG="dev"
          fi
          SHA="${GITHUB_SHA:0:12}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          cat > _site/_version.json <<EOF
          {
            "tag": "${TAG}",
            "sha": "${SHA}",
            "date": "${DATE}"
          }
          EOF
          echo "Wrote _site/_version.json:"
          cat _site/_version.json

      - name: Deploy _site/ to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PYEOF'
          import os, shutil
          from pathlib import Path
          from huggingface_hub import HfApi

          HF_SPACE = "vlbthambawita/ECGBench"
          api = HfApi(token=os.environ["HF_TOKEN"])
          sha = os.environ.get("GITHUB_SHA", "unknown")[:12]

          # Ensure the Space repo exists
          api.create_repo(
              repo_id=HF_SPACE,
              repo_type="space",
              space_sdk="static",
              exist_ok=True,
          )

          # Stage: copy the Jekyll-built _site/ then write HF Space README
          staging = Path("_hf_staging")
          if staging.exists():
              shutil.rmtree(staging)
          shutil.copytree("_site", staging)
          (staging / "README.md").write_text(
              "---\n"
              "title: ECGBench\n"
              "emoji: \"\U0001FAC0\"\n"
              "colorFrom: blue\n"
              "colorTo: purple\n"
              "sdk: static\n"
              "pinned: false\n"
              "license: mit\n"
              "short_description: Reproducible ECG benchmark datasets\n"
              "---\n"
          )

          print(f"Uploading to https://huggingface.co/spaces/{HF_SPACE} ...")
          api.upload_folder(
              folder_path=str(staging),
              repo_id=HF_SPACE,
              repo_type="space",
              commit_message=f"Deploy sha:{sha}",
              delete_patterns=["*"],
          )
          print(f"Successfully deployed to https://huggingface.co/spaces/{HF_SPACE}")
          PYEOF
